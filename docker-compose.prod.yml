services:
  ipt-app:
    image: ${IMAGE_TAG:-harbor.herpydevs.com/ipt_app/ipt-app:latest}
    container_name: ipt_app
    restart: unless-stopped
    env_file: .env.production
    environment:
      NODE_ENV: production
      PORT: "3000"
      NEXT_TELEMETRY_DISABLED: "1"
    expose:
      - "3000"
    networks:
      - shared-proxy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

networks:
  shared-proxy:
    name: shared-proxy
    external: true
