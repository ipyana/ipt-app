name: Deploy IPT App

on:
  push:
    branches: [main]

env:
  HARBOR_REGISTRY: harbor.iventika.co.tz
  HARBOR_PROJECT: ipt_app
  IMAGE_NAME: ipt-app
  TAG: production
  VPS_HOST: 109.123.241.223
  VPS_DIR: /opt/ipt-app
  COMPOSE_FILE: docker-compose.prod.yml

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/${{ env.IMAGE_NAME }}:${{ env.TAG }}
            ${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ env.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            FULL_IMAGE=${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/${{ env.IMAGE_NAME }}:${{ env.TAG }}

            docker pull $FULL_IMAGE

            # Run database migrations in a temporary container
            docker run --rm \
              --network=shared-proxy \
              --env-file ${{ env.VPS_DIR }}/.env.${{ env.TAG }} \
              $FULL_IMAGE \
              sh -c "npx prisma migrate deploy && echo 'Migrations done'"

            # Update compose file with latest image
            cd ${{ env.VPS_DIR }}
            export IMAGE_TAG=$FULL_IMAGE
            docker compose -f ${{ env.COMPOSE_FILE }} up -d
            docker image prune -f
